<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>firedux-storage — vanilla JS example</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; }
    #status { font-size: 0.9rem; color: #555; margin-bottom: 1rem; }
    #list { list-style: none; padding: 0; }
    #list li { border: 1px solid #ddd; padding: 0.5rem 1rem; border-radius: 4px; margin-bottom: 0.4rem; display: flex; justify-content: space-between; }
    button { cursor: pointer; padding: 0.3rem 0.8rem; border: none; border-radius: 4px; background: #333; color: #fff; }
    button.danger { background: #c0392b; }
    #form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    #form input { flex: 1; padding: 0.4rem 0.6rem; border: 1px solid #ccc; border-radius: 4px; }
    #auth { margin-bottom: 1rem; padding: 0.6rem 1rem; background: #f5f5f5; border-radius: 6px; display: flex; align-items: center; gap: 1rem; }
  </style>
</head>
<body>
  <h1>firedux-storage — vanilla JS</h1>

  <div id="auth">
    <span id="auth-label">Not signed in</span>
    <button id="btn-signin">Sign in with Google</button>
    <button id="btn-signout" hidden>Sign out</button>
  </div>

  <div id="form">
    <input id="input-title" type="text" placeholder="New todo title" />
    <button id="btn-add">Add</button>
  </div>

  <p id="status">Loading...</p>
  <ul id="list"></ul>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
